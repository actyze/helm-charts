{{- if and .Values.predictionWorker.enabled .Values.predictionWorker.models.xgboost.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dashboard.fullname" . }}-prediction-worker-xgboost
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: prediction-worker-xgboost
spec:
  replicas: {{ .Values.predictionWorker.models.xgboost.replicas | default 0 }}
  selector:
    matchLabels:
      {{- include "dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prediction-worker-xgboost
  template:
    metadata:
      labels:
        {{- include "dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prediction-worker-xgboost
    spec:
      containers:
      - name: prediction-worker-xgboost
        image: "{{ .Values.predictionWorker.models.xgboost.image | default "actyze/prediction-worker-xgboost:latest" }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - name: http
          containerPort: 8400
          protocol: TCP
        resources:
          {{- toYaml .Values.predictionWorker.models.xgboost.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
{{- end }}
